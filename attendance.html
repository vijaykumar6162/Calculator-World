<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Attendance Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.icon{
text-align:center;
font-size:60px;
margin-bottom:10px;
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
display:none;
margin-top:20px;
background:#f8fafc;
padding:20px;
border-radius:15px;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-left:5px solid #2563eb;
border-radius:8px;
font-size:17px;
}

.good{
color:#16a34a;
font-weight:bold;
}

.warning{
color:#dc2626;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="icon">🎓</div>

<h1>Advanced Attendance Calculator</h1>

<div class="input-group">
<label>Total Classes Conducted</label>
<input type="number" id="totalClasses" placeholder="Enter Total Classes">
</div>

<div class="input-group">
<label>Classes Attended</label>
<input type="number" id="attendedClasses" placeholder="Enter Attended Classes">
</div>

<div class="input-group">
<label>Target Attendance (%)</label>
<input type="number" id="targetAttendance" placeholder="Example: 75">
</div>

<button onclick="calculateAttendance()">
Calculate Attendance
</button>

<div class="result" id="result">

<div class="card">
📊 Current Attendance:
<span id="currentAttendance"></span>
</div>

<div class="card">
✅ Classes You Can Miss:
<span id="canMiss"></span>
</div>

<div class="card">
📚 Classes Needed To Reach Target:
<span id="needClasses"></span>
</div>

<div class="card">
🎯 Attendance Status:
<span id="status"></span>
</div>

</div>

</div>

<script>

function calculateAttendance(){

let total =
parseFloat(document.getElementById("totalClasses").value);

let attended =
parseFloat(document.getElementById("attendedClasses").value);

let target =
parseFloat(document.getElementById("targetAttendance").value);

if(isNaN(total) || isNaN(attended) || isNaN(target)){
alert("Please fill all fields");
return;
}

if(attended > total){
alert("Attended classes cannot exceed total classes");
return;
}

let attendance =
(attended/total)*100;

document.getElementById("currentAttendance").innerHTML =
attendance.toFixed(2)+"%";

let canMiss =
Math.floor((attended*100/target)-total);

if(canMiss < 0) canMiss = 0;

document.getElementById("canMiss").innerHTML =
canMiss + " Classes";

let needed = 0;

if(attendance < target){

needed =
Math.ceil(
((target*total) - (100*attended))
/
(100-target)
);

}

document.getElementById("needClasses").innerHTML =
needed + " Classes";

if(attendance >= target){

document.getElementById("status").innerHTML =
'<span class="good">Excellent 👍 Target Achieved</span>';

}else{

document.getElementById("status").innerHTML =
'<span class="warning">Below Target ⚠️</span>';

}

document.getElementById("result").style.display =
"block";

}

</script>

</body>
</html>
