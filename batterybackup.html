<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Backup Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
width:400px;
}

h1{
text-align:center;
color:#0d6efd;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
color:green;
}

.back{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>🔋 Battery Backup Calculator</h1>

<input type="number" id="battery" placeholder="Battery Ah">

<input type="number" id="load" placeholder="Load in Watts">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<a class="back" href="electrical.html">⬅ Back</a>

</div>

<script>

function calculate(){

let ah = document.getElementById("battery").value;

let load = document.getElementById("load").value;

let backup = (ah * 12 * 0.8) / load;

document.getElementById("result").innerHTML =
"Backup Time = " + backup.toFixed(2) + " Hours";

}

</script>

</body>
</html>
