<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>

<style>
body{
font-family:Arial;
text-align:center;
padding:50px;
background:#f5f7fb;
}

h1{
color:#2563eb;
}

input{
padding:10px;
font-size:18px;
margin:10px;
width:250px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>

</head>
<body>

<h1>🏥 BMI Calculator</h1>

<input type="number" id="weight" placeholder="Weight (kg)">

<br>

<input type="number" id="height" placeholder="Height (cm)">

<br>

<button onclick="calculateBMI()">Calculate BMI</button>

<div id="result"></div>

<script>

function calculateBMI(){

let weight =
parseFloat(document.getElementById("weight").value);

let height =
parseFloat(document.getElementById("height").value)/100;

let bmi =
weight/(height*height);

let status="";

if(bmi<18.5)
status="Underweight";

else if(bmi<25)
status="Normal Weight";

else if(bmi<30)
status="Overweight";

else
status="Obese";

document.getElementById("result").innerHTML=
`
BMI: ${bmi.toFixed(2)}
<br><br>
Status: ${status}
`;

}

</script>

</body>
</html>
