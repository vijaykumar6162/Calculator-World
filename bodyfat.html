<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Fat Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ff6b6b,#ff9f43);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:#fff;
    width:100%;
    max-width:550px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#ff6b6b;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#ff6b6b;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#e55039;
}

.result{
    display:none;
    margin-top:20px;
    padding:20px;
    background:#fff5f5;
    border-radius:15px;
    text-align:center;
}

.result h2{
    color:#ff6b6b;
}
</style>
</head>
<body>

<div class="container">
    <h1>🔥 Body Fat Calculator</h1>
    <p class="subtitle">Estimate Your Body Fat Percentage</p>

    <select id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (cm)">
    <input type="number" id="age" placeholder="Age">

    <button onclick="calculateBodyFat()">
        Calculate Body Fat
    </button>

    <div class="result" id="result">
        <h2 id="fatPercent"></h2>
        <p id="fatCategory"></p>
    </div>
</div>

<script>
function calculateBodyFat(){

    let weight =
    parseFloat(document.getElementById("weight").value);

    let height =
    parseFloat(document.getElementById("height").value);

    let age =
    parseFloat(document.getElementById("age").value);

    let gender =
    document.getElementById("gender").value;

    if(!weight || !height || !age){
        alert("Please fill all fields.");
        return;
    }

    let bmi =
    weight / ((height/100)*(height/100));

    let bodyFat;

    if(gender === "male"){
        bodyFat =
        (1.20 * bmi) + (0.23 * age) - 16.2;
    } else {
        bodyFat =
        (1.20 * bmi) + (0.23 * age) - 5.4;
    }

    let category = "";

    if(bodyFat < 10){
        category = "Essential Fat";
    } else if(bodyFat < 18){
        category = "Athletic";
    } else if(bodyFat < 25){
        category = "Fitness / Average";
    } else if(bodyFat < 32){
        category = "Overweight";
    } else {
        category = "Obese";
    }

    document.getElementById("result").style.display =
    "block";

    document.getElementById("fatPercent").innerHTML =
    bodyFat.toFixed(1) + "% Body Fat";

    document.getElementById("fatCategory").innerHTML =
    "Category: <b>" + category + "</b>";
}
</script>

</body>
</html>
