<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calories Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff6b6b,#ff9f43);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    background:white;
    width:400px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#ff5722;
}

input,select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#ff5722;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#e64a19;
}

.result{
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    background:#f5f5f5;
}
</style>
</head>
<body>

<div class="container">

<h2>🔥 Calories Calculator</h2>

<input type="number" id="age" placeholder="Age">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<input type="number" id="weight" placeholder="Weight (kg)">

<input type="number" id="height" placeholder="Height (cm)">

<select id="activity">
<option value="1.2">Sedentary (Little Exercise)</option>
<option value="1.375">Light Exercise</option>
<option value="1.55">Moderate Exercise</option>
<option value="1.725">Heavy Exercise</option>
<option value="1.9">Athlete</option>
</select>

<button onclick="calculateCalories()">
Calculate Calories
</button>

<div id="result"></div>

</div>

<script>

function calculateCalories(){

let age = parseFloat(document.getElementById("age").value);
let weight = parseFloat(document.getElementById("weight").value);
let height = parseFloat(document.getElementById("height").value);
let gender = document.getElementById("gender").value;
let activity = parseFloat(document.getElementById("activity").value);

if(!age || !weight || !height){
    alert("Please fill all fields");
    return;
}

let bmr;

if(gender === "male"){
    bmr = 10*weight + 6.25*height - 5*age + 5;
}
else{
    bmr = 10*weight + 6.25*height - 5*age - 161;
}

let calories = Math.round(bmr * activity);

document.getElementById("result").innerHTML = `
<div class="result">
<h3>Result</h3>
<p><b>BMR:</b> ${Math.round(bmr)} Calories/day</p>
<p><b>Daily Calories Needed:</b> ${calories} Calories/day</p>
<p><b>Weight Loss:</b> ${calories-500} Calories/day</p>
<p><b>Weight Gain:</b> ${calories+500} Calories/day</p>
</div>
`;

}

</script>

</body>
</html>
