<!DOCTYPE html>
<html>
<head>
<title>CGPA Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
text-align:center;
padding:50px;
}

h1{
color:#2563eb;
}

input{
padding:10px;
margin:10px;
width:220px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🎓 CGPA Calculator</h1>

<input type="number" step="0.01" id="sem1" placeholder="Semester 1 GPA">

<br>

<input type="number" step="0.01" id="sem2" placeholder="Semester 2 GPA">

<br>

<input type="number" step="0.01" id="sem3" placeholder="Semester 3 GPA">

<br>

<input type="number" step="0.01" id="sem4" placeholder="Semester 4 GPA">

<br>

<button onclick="calculateCGPA()">Calculate CGPA</button>

<div id="result"></div>

<script>

function calculateCGPA(){

let s1 = parseFloat(document.getElementById("sem1").value) || 0;
let s2 = parseFloat(document.getElementById("sem2").value) || 0;
let s3 = parseFloat(document.getElementById("sem3").value) || 0;
let s4 = parseFloat(document.getElementById("sem4").value) || 0;

let count = 0;

if(s1>0) count++;
if(s2>0) count++;
if(s3>0) count++;
if(s4>0) count++;

let cgpa = (s1+s2+s3+s4)/count;

document.getElementById("result").innerHTML =
`
Your CGPA: ${cgpa.toFixed(2)}
`;
}

</script>

</body>
</html>
