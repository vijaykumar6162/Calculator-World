<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Interest Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:20px;
}

.container{
    width:100%;
    max-width:650px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#0f172a;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input,select{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#0f172a;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1e293b;
}

.result{
    display:none;
    margin-top:20px;
    padding:20px;
    background:#f8fafc;
    border-radius:15px;
}

.result h2{
    color:#0f172a;
    margin-bottom:15px;
}

.info{
    margin:12px 0;
    font-size:18px;
    color:#333;
}
</style>
</head>
<body>

<div class="container">

    <h1>📈 Compound Interest Calculator</h1>

    <p class="subtitle">
        Calculate compound interest and future value
    </p>

    <input type="number" id="principal"
    placeholder="Principal Amount (₹)">

    <input type="number" id="rate"
    placeholder="Annual Interest Rate (%)">

    <input type="number" id="time"
    placeholder="Time (Years)">

    <select id="frequency">
        <option value="1">Yearly</option>
        <option value="2">Half-Yearly</option>
        <option value="4">Quarterly</option>
        <option value="12">Monthly</option>
    </select>

    <button onclick="calculateCI()">
        Calculate Compound Interest
    </button>

    <div class="result" id="result">

        <h2>Investment Result</h2>

        <div class="info" id="invested"></div>
        <div class="info" id="interest"></div>
        <div class="info" id="total"></div>

    </div>

</div>

<script>
function calculateCI(){

    let P = parseFloat(
        document.getElementById("principal").value
    );

    let R = parseFloat(
        document.getElementById("rate").value
    );

    let T = parseFloat(
        document.getElementById("time").value
    );

    let N = parseFloat(
        document.getElementById("frequency").value
    );

    if(!P || !R || !T){
        alert("Please fill all fields.");
        return;
    }

    let amount =
    P * Math.pow(
        (1 + (R/100)/N),
        N*T
    );

    let interest =
    amount - P;

    document.getElementById("result").style.display =
    "block";

    document.getElementById("invested").innerHTML =
    "💰 Principal Amount: <b>₹" +
    P.toLocaleString('en-IN') + "</b>";

    document.getElementById("interest").innerHTML =
    "📊 Compound Interest: <b>₹" +
    Math.round(interest).toLocaleString('en-IN') +
    "</b>";

    document.getElementById("total").innerHTML =
    "🏆 Future Value: <b>₹" +
    Math.round(amount).toLocaleString('en-IN') +
    "</b>";
}
</script>

</body>
</html>
