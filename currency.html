<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
padding:30px;
width:100%;
max-width:550px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

.icon{
text-align:center;
font-size:55px;
margin-bottom:10px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.result{
display:none;
margin-top:20px;
background:#f1f5f9;
padding:20px;
border-radius:15px;
text-align:center;
}

.result h2{
color:#16a34a;
}
</style>
</head>
<body>

<div class="container">

<div class="icon">💱</div>

<h1>Currency Converter</h1>

<div class="input-group">
<label>Amount</label>
<input type="number" id="amount" placeholder="Enter Amount">
</div>

<div class="input-group">
<label>From Currency</label>
<select id="from">
<option value="1">INR ₹</option>
<option value="83.5">USD $</option>
<option value="107">EUR €</option>
<option value="124">GBP £</option>
<option value="0.57">JPY ¥</option>
</select>
</div>

<div class="input-group">
<label>To Currency</label>
<select id="to">
<option value="1">INR ₹</option>
<option value="83.5">USD $</option>
<option value="107">EUR €</option>
<option value="124">GBP £</option>
<option value="0.57">JPY ¥</option>
</select>
</div>

<button onclick="convertCurrency()">Convert Currency</button>

<div class="result" id="result">
<h2 id="output"></h2>
</div>

</div>

<script>
function convertCurrency(){

let amount = parseFloat(document.getElementById("amount").value);
let fromRate = parseFloat(document.getElementById("from").value);
let toRate = parseFloat(document.getElementById("to").value);

if(!amount){
alert("Please enter amount");
return;
}

let inrValue = amount * fromRate;
let converted = inrValue / toRate;

document.getElementById("output").innerHTML =
"Converted Amount: " + converted.toFixed(2);

document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
