<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discount Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:20px;
}

.container{
    width:100%;
    max-width:550px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.icon{
    text-align:center;
    font-size:60px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:#2563eb;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    font-weight:600;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

input:focus{
    border-color:#2563eb;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.result{
    display:none;
    margin-top:20px;
    background:#f8fafc;
    padding:20px;
    border-radius:15px;
}

.result p{
    margin:10px 0;
    font-size:18px;
}

.highlight{
    color:#16a34a;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="icon">🏷️</div>

<h1>Discount Calculator</h1>

<div class="input-group">
<label>Original Price (₹)</label>
<input type="number" id="price" placeholder="Enter Original Price">
</div>

<div class="input-group">
<label>Discount (%)</label>
<input type="number" id="discount" placeholder="Enter Discount Percentage">
</div>

<button onclick="calculateDiscount()">Calculate Discount</button>

<div class="result" id="result">
<p>Original Price: <span class="highlight" id="original"></span></p>
<p>Discount Amount: <span class="highlight" id="discountAmount"></span></p>
<p>Final Price: <span class="highlight" id="finalPrice"></span></p>
<p>You Save: <span class="highlight" id="save"></span></p>
</div>

</div>

<script>
function calculateDiscount(){

let price = parseFloat(document.getElementById("price").value);
let discount = parseFloat(document.getElementById("discount").value);

if(!price || discount < 0 || discount > 100){
    alert("Please enter valid values.");
    return;
}

let discountAmount = (price * discount) / 100;
let finalPrice = price - discountAmount;

document.getElementById("original").innerHTML =
"₹" + price.toFixed(2);

document.getElementById("discountAmount").innerHTML =
"₹" + discountAmount.toFixed(2);

document.getElementById("finalPrice").innerHTML =
"₹" + finalPrice.toFixed(2);

document.getElementById("save").innerHTML =
"₹" + discountAmount.toFixed(2);

document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
