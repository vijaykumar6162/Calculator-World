<!DOCTYPE html>
<html>
<head>
<title>Energy Bill Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
text-align:center;
padding:50px;
}

h1{
color:#2563eb;
}

input{
padding:10px;
margin:10px;
width:280px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>⚡ Energy Bill Calculator</h1>

<input type="number" id="power" placeholder="Appliance Power (W)">

<br>

<input type="number" id="hours" placeholder="Hours Used Per Day">

<br>

<input type="number" id="days" placeholder="Number of Days">

<br>

<input type="number" id="rate" placeholder="Electricity Rate (₹/kWh)">

<br>

<button onclick="calculateBill()">Calculate Bill</button>

<div id="result"></div>

<script>

function calculateBill(){

let power =
parseFloat(document.getElementById("power").value);

let hours =
parseFloat(document.getElementById("hours").value);

let days =
parseFloat(document.getElementById("days").value);

let rate =
parseFloat(document.getElementById("rate").value);

let units =
(power * hours * days)/1000;

let bill =
units * rate;

document.getElementById("result").innerHTML =
`
Units Consumed: ${units.toFixed(2)} kWh
<br><br>
Estimated Bill: ₹${bill.toFixed(2)}
`;

}

</script>

</body>
</html>
