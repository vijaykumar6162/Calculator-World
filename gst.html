<!DOCTYPE html>
<html>
<head>
<title>GST Calculator</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:50px;
background:#f5f7fb;
}

h1{
color:#2563eb;
}

input{
padding:10px;
font-size:18px;
margin:10px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>💰 GST Calculator</h1>

<input type="number" id="amount" placeholder="Enter Amount">

<br>

<input type="number" id="gst" placeholder="GST %">

<br>

<button onclick="calculateGST()">Calculate GST</button>

<div id="result"></div>

<script>

function calculateGST(){

let amount =
parseFloat(document.getElementById("amount").value);

let gst =
parseFloat(document.getElementById("gst").value);

let gstAmount =
(amount * gst) / 100;

let total =
amount + gstAmount;

document.getElementById("result").innerHTML =
`
GST Amount: ₹${gstAmount.toFixed(2)}
<br><br>
Total Amount: ₹${total.toFixed(2)}
`;

}

</script>

</body>
</html>
