<!DOCTYPE html>
<html>
<head>
<title>Heart Rate Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
width:400px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#e91e63;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#03a9f4;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:15px;
padding:15px;
background:#f1f1f1;
border-radius:8px;
}
</style>

</head>
<body>

<div class="box">

<h2>❤️ Heart Rate Calculator</h2>

<input type="number" id="age" placeholder="Enter Age">

<button onclick="calculateHeartRate()">
Calculate
</button>

<div id="result"></div>

</div>

<script>

function calculateHeartRate(){

let age = document.getElementById("age").value;

if(age==""){
alert("Enter Age");
return;
}

let maxHR = 220-age;
let fatBurn = Math.round(maxHR*0.65);
let cardio = Math.round(maxHR*0.75);
let peak = Math.round(maxHR*0.85);

document.getElementById("result").innerHTML=
`
<div class="result">

<h3>Result</h3>

<p><b>Maximum Heart Rate:</b> ${maxHR} BPM</p>

<p><b>Fat Burn Zone:</b> ${fatBurn} BPM</p>

<p><b>Cardio Zone:</b> ${cardio} BPM</p>

<p><b>Peak Zone:</b> ${peak} BPM</p>

</div>
`;

}

</script>

</body>
</html>
