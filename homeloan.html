<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Home Loan Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:650px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    color:white;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

input:focus,
select:focus{
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#15803d;
}

.result{
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    display:none;
}

.result h2{
    margin-bottom:15px;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:12px;
    margin:10px 0;
    border-radius:10px;
}

.highlight{
    color:#4ade80;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>🏠 Advanced Home Loan Calculator</h1>
<p class="subtitle">
Calculate EMI using Years, Months or Days
</p>

<div class="input-group">
<label>Property Price (₹)</label>
<input type="number" id="propertyPrice" placeholder="Enter Property Price">
</div>

<div class="input-group">
<label>Down Payment (₹)</label>
<input type="number" id="downPayment" placeholder="Enter Down Payment">
</div>

<div class="input-group">
<label>Interest Rate (% Per Year)</label>
<input type="number" id="interestRate" placeholder="Enter Interest Rate">
</div>

<div class="input-group">
<label>Loan Tenure</label>
<input type="number" id="loanTenure" placeholder="Enter Tenure">
</div>

<div class="input-group">
<label>Tenure Unit</label>
<select id="tenureUnit">
<option value="year">Years</option>
<option value="month">Months</option>
<option value="day">Days</option>
</select>
</div>

<button onclick="calculateHomeLoan()">
Calculate Home Loan
</button>

<div class="result" id="result">

<h2>📊 Home Loan Summary</h2>

<div class="card">
🏡 Loan Amount:
<span class="highlight" id="loanAmount"></span>
</div>

<div class="card">
💰 Monthly EMI:
<span class="highlight" id="emi"></span>
</div>

<div class="card">
📈 Total Interest:
<span class="highlight" id="totalInterest"></span>
</div>

<div class="card">
🏆 Total Payment:
<span class="highlight" id="totalPayment"></span>
</div>

<div class="card">
📅 Loan Duration:
<span class="highlight" id="loanDuration"></span>
</div>

</div>

</div>

<script>

function calculateHomeLoan(){

let propertyPrice =
parseFloat(document.getElementById("propertyPrice").value);

let downPayment =
parseFloat(document.getElementById("downPayment").value) || 0;

let rate =
parseFloat(document.getElementById("interestRate").value);

let tenure =
parseFloat(document.getElementById("loanTenure").value);

let unit =
document.getElementById("tenureUnit").value;

if(!propertyPrice || !rate || !tenure){
    alert("Please fill all fields");
    return;
}

let principal = propertyPrice - downPayment;

if(principal <= 0){
    alert("Down Payment cannot be greater than Property Price");
    return;
}

let months;

if(unit === "year"){
    months = tenure * 12;
}
else if(unit === "month"){
    months = tenure;
}
else if(unit === "day"){
    months = tenure / 30.44;
}

months = Math.max(1, Math.round(months));

let monthlyRate = rate / 12 / 100;

let emi;

if(monthlyRate === 0){
    emi = principal / months;
}
else{
    emi =
    (principal * monthlyRate *
    Math.pow(1 + monthlyRate, months))
    /
    (Math.pow(1 + monthlyRate, months) - 1);
}

let totalPayment = emi * months;
let totalInterest = totalPayment - principal;

document.getElementById("loanAmount").innerHTML =
"₹" + principal.toLocaleString('en-IN',{
maximumFractionDigits:2
});

document.getElementById("emi").innerHTML =
"₹" + emi.toLocaleString('en-IN',{
maximumFractionDigits:2
});

document.getElementById("totalInterest").innerHTML =
"₹" + totalInterest.toLocaleString('en-IN',{
maximumFractionDigits:2
});

document.getElementById("totalPayment").innerHTML =
"₹" + totalPayment.toLocaleString('en-IN',{
maximumFractionDigits:2
});

document.getElementById("loanDuration").innerHTML =
months + " Months";

document.getElementById("result").style.display = "block";
}

</script>

</body>
</html>
