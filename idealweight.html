<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Weight Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00c9ff,#92fe9d);
    padding:20px;
}

.container{
    background:#fff;
    width:100%;
    max-width:600px;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#00a86b;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input,select{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#00a86b;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#008f5a;
}

.result{
    display:none;
    margin-top:20px;
    padding:20px;
    background:#f0fff7;
    border-radius:15px;
}

.result h2{
    color:#00a86b;
    margin-bottom:10px;
}

.info{
    margin:10px 0;
    font-size:18px;
    color:#333;
}
</style>
</head>
<body>

<div class="container">

    <h1>⚖️ Ideal Weight Calculator</h1>
    <p class="subtitle">
        Check your healthy weight range
    </p>

    <select id="gender">
        <option value="">Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

    <input type="number" id="height" placeholder="Height (cm)">

    <button onclick="calculateWeight()">
        Calculate Ideal Weight
    </button>

    <div class="result" id="result">

        <h2>Your Ideal Weight</h2>

        <div class="info" id="ideal"></div>
        <div class="info" id="range"></div>

    </div>

</div>

<script>
function calculateWeight(){

    let height =
    parseFloat(document.getElementById("height").value);

    let gender =
    document.getElementById("gender").value;

    if(!height || gender===""){
        alert("Please fill all fields.");
        return;
    }

    let ideal;

    if(gender === "male"){
        ideal = 50 + (0.91 * (height - 152.4));
    }else{
        ideal = 45.5 + (0.91 * (height - 152.4));
    }

    let minWeight = ideal - 5;
    let maxWeight = ideal + 5;

    document.getElementById("result").style.display =
    "block";

    document.getElementById("ideal").innerHTML =
    "🎯 Ideal Weight: <b>" +
    ideal.toFixed(1) + " kg</b>";

    document.getElementById("range").innerHTML =
    "📊 Healthy Range: <b>" +
    minWeight.toFixed(1) + " kg - " +
    maxWeight.toFixed(1) + " kg</b>";
}
</script>

</body>
</html>
