<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Length Converter</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:650px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.icon{
text-align:center;
font-size:60px;
margin-bottom:10px;
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
}

input:focus,
select:focus{
outline:none;
border-color:#2563eb;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
display:none;
margin-top:20px;
background:#f8fafc;
padding:20px;
border-radius:15px;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-left:5px solid #2563eb;
border-radius:8px;
font-size:17px;
}

.highlight{
color:#16a34a;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="icon">📏</div>

<h1>Advanced Length Converter</h1>

<div class="input-group">
<label>Enter Value</label>
<input type="number" id="value" placeholder="Enter Length">
</div>

<div class="input-group">
<label>From Unit</label>
<select id="fromUnit">
<option value="m">Meter</option>
<option value="km">Kilometer</option>
<option value="cm">Centimeter</option>
<option value="mm">Millimeter</option>
<option value="in">Inch</option>
<option value="ft">Foot</option>
<option value="yd">Yard</option>
<option value="mi">Mile</option>
</select>
</div>

<div class="input-group">
<label>To Unit</label>
<select id="toUnit">
<option value="m">Meter</option>
<option value="km">Kilometer</option>
<option value="cm">Centimeter</option>
<option value="mm">Millimeter</option>
<option value="in">Inch</option>
<option value="ft">Foot</option>
<option value="yd">Yard</option>
<option value="mi">Mile</option>
</select>
</div>

<button onclick="convertLength()">Convert Length</button>

<div class="result" id="result">

<div class="card">
📏 Converted Value:
<span class="highlight" id="output"></span>
</div>

<div class="card">
🔄 Conversion Formula Applied
</div>

</div>

</div>

<script>

function convertLength(){

let value =
parseFloat(document.getElementById("value").value);

let from =
document.getElementById("fromUnit").value;

let to =
document.getElementById("toUnit").value;

if(!value){
alert("Please enter a value");
return;
}

const meters = {
m:1,
km:1000,
cm:0.01,
mm:0.001,
in:0.0254,
ft:0.3048,
yd:0.9144,
mi:1609.344
};

let meterValue = value * meters[from];
let result = meterValue / meters[to];

document.getElementById("output").innerHTML =
result.toLocaleString('en-IN',{
maximumFractionDigits:8
}) + " " + to;

document.getElementById("result").style.display =
"block";

}

</script>

</body>
</html>
