<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan EMI Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.container{
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#00a844;
}

.result{
    margin-top:20px;
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    display:none;
}

.result p{
    margin:10px 0;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">
    <h1>🏦 Loan EMI Calculator</h1>

    <div class="input-group">
        <label>Loan Amount (₹)</label>
        <input type="number" id="amount" placeholder="Enter Loan Amount">
    </div>

    <div class="input-group">
        <label>Interest Rate (%) Per Year</label>
        <input type="number" id="rate" placeholder="Enter Interest Rate">
    </div>

    <div class="input-group">
        <label>Loan Tenure (Years)</label>
        <input type="number" id="years" placeholder="Enter Years">
    </div>

    <button onclick="calculateEMI()">Calculate EMI</button>

    <div class="result" id="result">
        <p><strong>Monthly EMI:</strong> ₹ <span id="emi"></span></p>
        <p><strong>Total Payment:</strong> ₹ <span id="total"></span></p>
        <p><strong>Total Interest:</strong> ₹ <span id="interest"></span></p>
    </div>
</div>

<script>
function calculateEMI(){

    let P = parseFloat(document.getElementById("amount").value);
    let annualRate = parseFloat(document.getElementById("rate").value);
    let years = parseFloat(document.getElementById("years").value);

    if(!P || !annualRate || !years){
        alert("Please fill all fields");
        return;
    }

    let R = annualRate / 12 / 100;
    let N = years * 12;

    let EMI = (P * R * Math.pow(1+R,N)) /
              (Math.pow(1+R,N)-1);

    let totalPayment = EMI * N;
    let totalInterest = totalPayment - P;

    document.getElementById("emi").innerHTML =
        EMI.toFixed(2);

    document.getElementById("total").innerHTML =
        totalPayment.toFixed(2);

    document.getElementById("interest").innerHTML =
        totalInterest.toFixed(2);

    document.getElementById("result").style.display="block";
}
</script>

</body>
</html>
