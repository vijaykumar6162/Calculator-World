<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Loan EMI Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:600px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
    color:white;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
    transition:.3s;
}

button:hover{
    background:#00a844;
}

.result{
    margin-top:20px;
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    display:none;
}

.result h2{
    margin-bottom:15px;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:12px;
    border-radius:10px;
    margin:10px 0;
    font-size:17px;
}

.highlight{
    color:#4ade80;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>🏦 Advanced Loan EMI Calculator</h1>

<p class="subtitle">
Calculate EMI Using Years, Months or Days
</p>

<div class="input-group">
<label>Loan Amount (₹)</label>
<input type="number" id="amount" placeholder="Enter Loan Amount">
</div>

<div class="input-group">
<label>Interest Rate (% Per Year)</label>
<input type="number" id="rate" placeholder="Enter Interest Rate">
</div>

<div class="input-group">
<label>Loan Tenure</label>
<input type="number" id="tenure" placeholder="Enter Tenure">
</div>

<div class="input-group">
<label>Tenure Unit</label>
<select id="tenureUnit">
<option value="year">Years</option>
<option value="month">Months</option>
<option value="day">Days</option>
</select>
</div>

<button onclick="calculateEMI()">
Calculate EMI
</button>

<div class="result" id="result">

<h2>📊 Loan Summary</h2>

<div class="card">
💰 Monthly EMI:
<span class="highlight" id="emi"></span>
</div>

<div class="card">
🏆 Total Payment:
<span class="highlight" id="total"></span>
</div>

<div class="card">
📈 Total Interest:
<span class="highlight" id="interest"></span>
</div>

<div class="card">
📅 Total Months:
<span class="highlight" id="months"></span>
</div>

<div class="card">
💵 Loan Amount:
<span class="highlight" id="loanAmount"></span>
</div>

</div>

</div>

<script>

function calculateEMI(){

let P = parseFloat(document.getElementById("amount").value);
let annualRate = parseFloat(document.getElementById("rate").value);
let tenure = parseFloat(document.getElementById("tenure").value);
let unit = document.getElementById("tenureUnit").value;

if(!P || !annualRate || !tenure){
    alert("Please fill all fields");
    return;
}

let N;

if(unit === "year"){
    N = tenure * 12;
}
else if(unit === "month"){
    N = tenure;
}
else if(unit === "day"){
    N = tenure / 30.44;
}

N = Math.max(1, Math.round(N));

let R = annualRate / 12 / 100;

let EMI;

if(R === 0){
    EMI = P / N;
}
else{
    EMI = (P * R * Math.pow(1 + R, N)) /
          (Math.pow(1 + R, N) - 1);
}

let totalPayment = EMI * N;
let totalInterest = totalPayment - P;

document.getElementById("emi").innerHTML =
"₹" + EMI.toLocaleString('en-IN',{
maximumFractionDigits:2
});

document.getElementById("total").innerHTML =
"₹" + totalPayment.toLocaleString('en-IN',{
maximumFractionDigits:2
});

document.getElementById("interest").innerHTML =
"₹" + totalInterest.toLocaleString('en-IN',{
maximumFractionDigits:2
});

document.getElementById("months").innerHTML =
N + " Months";

document.getElementById("loanAmount").innerHTML =
"₹" + P.toLocaleString('en-IN');

document.getElementById("result").style.display = "block";
}

</script>

</body>
</html>
