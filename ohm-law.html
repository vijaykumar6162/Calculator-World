<!DOCTYPE html>
<html>
<head>
<title>Ohm's Law Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
text-align:center;
padding:50px;
}

h1{
color:#2563eb;
}

input{
padding:10px;
margin:10px;
width:250px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>

</head>
<body>

<h1>⚡ Ohm's Law Calculator</h1>

<input type="number" id="voltage" placeholder="Voltage (V)">

<br>

<input type="number" id="current" placeholder="Current (A)">

<br>

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

<script>

function calculate(){

let V = parseFloat(document.getElementById("voltage").value);
let I = parseFloat(document.getElementById("current").value);

let R = V / I;
let P = V * I;

document.getElementById("result").innerHTML =
`
Resistance = ${R.toFixed(2)} Ω
<br><br>
Power = ${P.toFixed(2)} W
`;

}

</script>

</body>
</html>
