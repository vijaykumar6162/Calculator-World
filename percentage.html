<!DOCTYPE html>
<html>
<head>
<title>Percentage Calculator</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:50px;
background:#f5f7fb;
}

h1{
color:#2563eb;
}

input{
padding:10px;
font-size:18px;
margin:10px;
width:250px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>📊 Percentage Calculator</h1>

<input type="number" id="obtained" placeholder="Obtained Marks">

<br>

<input type="number" id="total" placeholder="Total Marks">

<br>

<button onclick="calculatePercentage()">Calculate</button>

<div id="result"></div>

<script>

function calculatePercentage(){

let obtained =
parseFloat(document.getElementById("obtained").value);

let total =
parseFloat(document.getElementById("total").value);

let percentage =
(obtained / total) * 100;

let grade = "F";

if(percentage >= 90) grade = "A+";
else if(percentage >= 80) grade = "A";
else if(percentage >= 70) grade = "B";
else if(percentage >= 60) grade = "C";
else if(percentage >= 50) grade = "D";

document.getElementById("result").innerHTML =
`
Percentage: ${percentage.toFixed(2)}%
<br><br>
Grade: ${grade}
`;

}

</script>

</body>
</html>
