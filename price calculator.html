<!DOCTYPE html>
<html>
<head>
<title>Market Price Calculator</title>

<style>
body{
font-family:Arial;
text-align:center;
padding:50px;
background:#f5f7fb;
}

input{
padding:10px;
margin:10px;
width:250px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:24px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🛒 Market Price Calculator</h1>

<input type="number" id="price" placeholder="Price per KG (₹)">

<br>

<input type="number" id="kg" placeholder="KG">

<br>

<input type="number" id="gram" placeholder="Gram">

<br>

<button onclick="calculatePrice()">Calculate</button>

<div id="result"></div>

<script>

function calculatePrice(){

let price =
parseFloat(document.getElementById("price").value);

let kg =
parseFloat(document.getElementById("kg").value) || 0;

let gram =
parseFloat(document.getElementById("gram").value) || 0;

let totalWeight =
kg + (gram/1000);

let totalPrice =
price * totalWeight;

document.getElementById("result").innerHTML =
`
Total Weight = ${totalWeight.toFixed(3)} kg
<br><br>
Total Price = ₹${totalPrice.toFixed(2)}
`;

}

</script>

</body>
</html>
