<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit & Loss Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#11998e,#38ef7d);
    padding:20px;
}

.container{
    width:100%;
    max-width:600px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#11998e;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#11998e;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0d7f75;
}

.result{
    display:none;
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    background:#f4fffa;
}

.result h2{
    color:#11998e;
    margin-bottom:15px;
}

.info{
    margin:10px 0;
    font-size:18px;
    color:#333;
}

.profit{
    color:green;
    font-weight:bold;
}

.loss{
    color:red;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <h1>💹 Profit & Loss Calculator</h1>
    <p class="subtitle">
        Calculate profit, loss and percentage instantly
    </p>

    <input type="number" id="costPrice"
    placeholder="Cost Price (₹)">

    <input type="number" id="sellingPrice"
    placeholder="Selling Price (₹)">

    <button onclick="calculatePL()">
        Calculate
    </button>

    <div class="result" id="result">

        <h2>Result</h2>

        <div class="info" id="status"></div>
        <div class="info" id="amount"></div>
        <div class="info" id="percentage"></div>

    </div>

</div>

<script>
function calculatePL(){

    let cp = parseFloat(
        document.getElementById("costPrice").value
    );

    let sp = parseFloat(
        document.getElementById("sellingPrice").value
    );

    if(isNaN(cp) || isNaN(sp) || cp <= 0){
        alert("Please enter valid values.");
        return;
    }

    let resultBox =
    document.getElementById("result");

    let status =
    document.getElementById("status");

    let amount =
    document.getElementById("amount");

    let percentage =
    document.getElementById("percentage");

    resultBox.style.display = "block";

    if(sp > cp){

        let profit = sp - cp;
        let profitPercent =
        (profit / cp) * 100;

        status.innerHTML =
        "<span class='profit'>✅ PROFIT</span>";

        amount.innerHTML =
        "💰 Profit Amount: <b>₹" +
        profit.toFixed(2) + "</b>";

        percentage.innerHTML =
        "📈 Profit Percentage: <b>" +
        profitPercent.toFixed(2) + "%</b>";

    }
    else if(cp > sp){

        let loss = cp - sp;
        let lossPercent =
        (loss / cp) * 100;

        status.innerHTML =
        "<span class='loss'>❌ LOSS</span>";

        amount.innerHTML =
        "💸 Loss Amount: <b>₹" +
        loss.toFixed(2) + "</b>";

        percentage.innerHTML =
        "📉 Loss Percentage: <b>" +
        lossPercent.toFixed(2) + "%</b>";

    }
    else{

        status.innerHTML =
        "⚖️ No Profit No Loss";

        amount.innerHTML =
        "Amount Difference: ₹0";

        percentage.innerHTML =
        "Percentage: 0%";
    }
}
</script>

</body>
</html>
