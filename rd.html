<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RD Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:550px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.icon{
    text-align:center;
    font-size:55px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:#2563eb;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

input:focus{
    border-color:#2563eb;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.result{
    display:none;
    margin-top:25px;
    background:#f1f5f9;
    padding:20px;
    border-radius:15px;
}

.result p{
    margin:10px 0;
    font-size:18px;
}

.highlight{
    color:#16a34a;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="icon">💰</div>

<h1>RD Calculator</h1>

<div class="input-group">
<label>Monthly Deposit (₹)</label>
<input type="number" id="monthlyDeposit" placeholder="Enter Monthly RD Amount">
</div>

<div class="input-group">
<label>Interest Rate (% p.a.)</label>
<input type="number" id="rate" placeholder="Enter Interest Rate">
</div>

<div class="input-group">
<label>Tenure (Months)</label>
<input type="number" id="months" placeholder="Enter RD Duration">
</div>

<button onclick="calculateRD()">Calculate RD</button>

<div class="result" id="result">
<p>Total Deposit: <span class="highlight" id="deposit"></span></p>
<p>Maturity Amount: <span class="highlight" id="maturity"></span></p>
<p>Total Interest Earned: <span class="highlight" id="interest"></span></p>
</div>

</div>

<script>
function calculateRD(){

let P = parseFloat(document.getElementById("monthlyDeposit").value);
let R = parseFloat(document.getElementById("rate").value);
let N = parseFloat(document.getElementById("months").value);

if(!P || !R || !N){
    alert("Please fill all fields.");
    return;
}

let i = R / 100 / 12;

let maturity = P * (((Math.pow(1+i,N)-1)/i) * (1+i));

let totalDeposit = P * N;
let interest = maturity - totalDeposit;

document.getElementById("deposit").innerHTML =
"₹" + totalDeposit.toLocaleString();

document.getElementById("maturity").innerHTML =
"₹" + maturity.toFixed(2);

document.getElementById("interest").innerHTML =
"₹" + interest.toFixed(2);

document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
