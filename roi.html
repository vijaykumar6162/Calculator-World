<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROI Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#134E5E,#71B280);
    padding:20px;
}

.container{
    width:100%;
    max-width:650px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#134E5E;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#134E5E;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0f3f4d;
}

.result{
    display:none;
    margin-top:20px;
    padding:20px;
    background:#f4fffb;
    border-radius:15px;
}

.result h2{
    color:#134E5E;
    margin-bottom:15px;
}

.info{
    margin:12px 0;
    font-size:18px;
    color:#333;
}
</style>
</head>
<body>

<div class="container">

    <h1>📊 ROI Calculator</h1>

    <p class="subtitle">
        Calculate Return on Investment (ROI)
    </p>

    <input type="number" id="investment"
    placeholder="Initial Investment (₹)">

    <input type="number" id="finalValue"
    placeholder="Final Value (₹)">

    <button onclick="calculateROI()">
        Calculate ROI
    </button>

    <div class="result" id="result">

        <h2>Investment Analysis</h2>

        <div class="info" id="profit"></div>
        <div class="info" id="roi"></div>
        <div class="info" id="growth"></div>

    </div>

</div>

<script>
function calculateROI(){

    let investment =
    parseFloat(document.getElementById("investment").value);

    let finalValue =
    parseFloat(document.getElementById("finalValue").value);

    if(!investment || !finalValue || investment <= 0){
        alert("Please enter valid values.");
        return;
    }

    let profit = finalValue - investment;

    let roi =
    (profit / investment) * 100;

    document.getElementById("result").style.display =
    "block";

    document.getElementById("profit").innerHTML =
    "💰 Profit/Loss: <b>₹" +
    profit.toLocaleString('en-IN') + "</b>";

    document.getElementById("roi").innerHTML =
    "📈 ROI: <b>" +
    roi.toFixed(2) + "%</b>";

    document.getElementById("growth").innerHTML =
    "🚀 Growth Multiple: <b>" +
    (finalValue / investment).toFixed(2) +
    "x</b>";
}
</script>

</body>
</html>
