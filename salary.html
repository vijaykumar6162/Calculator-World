<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Salary Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.icon{
text-align:center;
font-size:60px;
margin-bottom:10px;
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
}

input:focus{
outline:none;
border-color:#2563eb;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
display:none;
margin-top:20px;
background:#f8fafc;
padding:20px;
border-radius:15px;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-left:5px solid #2563eb;
border-radius:8px;
font-size:17px;
}

.highlight{
color:#16a34a;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="icon">💰</div>

<h1>Advanced Salary Calculator</h1>

<div class="input-group">
<label>Monthly Salary (₹)</label>
<input type="number" id="salary" placeholder="Enter Monthly Salary">
</div>

<div class="input-group">
<label>Monthly Bonus (₹)</label>
<input type="number" id="bonus" placeholder="Enter Bonus" value="0">
</div>

<div class="input-group">
<label>Monthly Allowance (₹)</label>
<input type="number" id="allowance" placeholder="Enter Allowance" value="0">
</div>

<div class="input-group">
<label>Tax Deduction (%)</label>
<input type="number" id="tax" placeholder="Enter Tax %" value="0">
</div>

<button onclick="calculateSalary()">
Calculate Salary
</button>

<div class="result" id="result">

<div class="card">
💵 Gross Monthly Salary:
<span class="highlight" id="gross"></span>
</div>

<div class="card">
📉 Tax Amount:
<span class="highlight" id="taxAmount"></span>
</div>

<div class="card">
🏆 Net Monthly Salary:
<span class="highlight" id="net"></span>
</div>

<div class="card">
📅 Annual Salary:
<span class="highlight" id="annual"></span>
</div>

<div class="card">
📆 Daily Salary:
<span class="highlight" id="daily"></span>
</div>

<div class="card">
⏰ Hourly Salary:
<span class="highlight" id="hourly"></span>
</div>

</div>

</div>

<script>

function calculateSalary(){

let salary =
parseFloat(document.getElementById("salary").value);

let bonus =
parseFloat(document.getElementById("bonus").value) || 0;

let allowance =
parseFloat(document.getElementById("allowance").value) || 0;

let tax =
parseFloat(document.getElementById("tax").value) || 0;

if(isNaN(salary)){
alert("Please enter salary");
return;
}

let gross =
salary + bonus + allowance;

let taxAmount =
(gross * tax) / 100;

let net =
gross - taxAmount;

let annual =
net * 12;

let daily =
net / 30;

let hourly =
daily / 8;

document.getElementById("gross").innerHTML =
"₹" + gross.toLocaleString('en-IN');

document.getElementById("taxAmount").innerHTML =
"₹" + taxAmount.toLocaleString('en-IN');

document.getElementById("net").innerHTML =
"₹" + net.toLocaleString('en-IN');

document.getElementById("annual").innerHTML =
"₹" + annual.toLocaleString('en-IN');

document.getElementById("daily").innerHTML =
"₹" + daily.toFixed(2);

document.getElementById("hourly").innerHTML =
"₹" + hourly.toFixed(2);

document.getElementById("result").style.display =
"block";

}

</script>

</body>
</html>
