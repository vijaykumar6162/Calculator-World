<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selling Price Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:750px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.icon{
text-align:center;
font-size:60px;
margin-bottom:10px;
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
font-weight:600;
margin-bottom:6px;
}

input{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
display:none;
margin-top:20px;
background:#f8fafc;
padding:20px;
border-radius:15px;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-left:5px solid #2563eb;
border-radius:8px;
font-size:17px;
}

.highlight{
color:#16a34a;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="icon">🏷️</div>

<h1>Selling Price Calculator</h1>

<div class="input-group">
<label>Cost Price (₹)</label>
<input type="number" id="costPrice" placeholder="Enter Cost Price">
</div>

<div class="input-group">
<label>Profit Margin (%)</label>
<input type="number" id="profitPercent" placeholder="Enter Profit %" value="20">
</div>

<div class="input-group">
<label>GST (%)</label>
<input type="number" id="gstPercent" placeholder="Enter GST %" value="18">
</div>

<div class="input-group">
<label>Discount (%)</label>
<input type="number" id="discountPercent" placeholder="Enter Discount %" value="0">
</div>

<button onclick="calculateSellingPrice()">
Calculate Selling Price
</button>

<div class="result" id="result">

<div class="card">
💰 Cost Price:
<span class="highlight" id="cp"></span>
</div>

<div class="card">
📈 Profit Amount:
<span class="highlight" id="profit"></span>
</div>

<div class="card">
🏷️ Selling Price Before GST:
<span class="highlight" id="sp"></span>
</div>

<div class="card">
🧾 GST Amount:
<span class="highlight" id="gst"></span>
</div>

<div class="card">
🎁 Discount Amount:
<span class="highlight" id="discount"></span>
</div>

<div class="card">
🏆 Final Selling Price:
<span class="highlight" id="finalPrice"></span>
</div>

</div>

</div>

<script>

function calculateSellingPrice(){

let cp =
parseFloat(document.getElementById("costPrice").value);

let profitPercent =
parseFloat(document.getElementById("profitPercent").value) || 0;

let gstPercent =
parseFloat(document.getElementById("gstPercent").value) || 0;

let discountPercent =
parseFloat(document.getElementById("discountPercent").value) || 0;

if(isNaN(cp) || cp<=0){
alert("Please enter valid Cost Price");
return;
}

let profitAmount =
(cp * profitPercent) / 100;

let sellingPrice =
cp + profitAmount;

let gstAmount =
(sellingPrice * gstPercent) / 100;

let priceWithGST =
sellingPrice + gstAmount;

let discountAmount =
(priceWithGST * discountPercent) / 100;

let finalPrice =
priceWithGST - discountAmount;

document.getElementById("cp").innerHTML =
"₹" + cp.toLocaleString('en-IN');

document.getElementById("profit").innerHTML =
"₹" + profitAmount.toFixed(2);

document.getElementById("sp").innerHTML =
"₹" + sellingPrice.toFixed(2);

document.getElementById("gst").innerHTML =
"₹" + gstAmount.toFixed(2);

document.getElementById("discount").innerHTML =
"₹" + discountAmount.toFixed(2);

document.getElementById("finalPrice").innerHTML =
"₹" + finalPrice.toFixed(2);

document.getElementById("result").style.display =
"block";

}

</script>

</body>
</html>
