<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Interest Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    padding:20px;
}

.container{
    width:100%;
    max-width:600px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#2a5298;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#2a5298;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1e3c72;
}

.result{
    display:none;
    margin-top:20px;
    padding:20px;
    background:#f4f8ff;
    border-radius:15px;
}

.result h2{
    color:#2a5298;
    margin-bottom:15px;
}

.info{
    margin:12px 0;
    font-size:18px;
    color:#333;
}
</style>
</head>
<body>

<div class="container">

    <h1>🏦 Simple Interest Calculator</h1>
    <p class="subtitle">
        Calculate Simple Interest and Total Amount
    </p>

    <input type="number" id="principal"
    placeholder="Principal Amount (₹)">

    <input type="number" id="rate"
    placeholder="Interest Rate (% per year)">

    <input type="number" id="time"
    placeholder="Time (Years)">

    <button onclick="calculateSI()">
        Calculate Interest
    </button>

    <div class="result" id="result">

        <h2>Calculation Result</h2>

        <div class="info" id="interest"></div>
        <div class="info" id="total"></div>

    </div>

</div>

<script>
function calculateSI(){

    let principal =
    parseFloat(document.getElementById("principal").value);

    let rate =
    parseFloat(document.getElementById("rate").value);

    let time =
    parseFloat(document.getElementById("time").value);

    if(!principal || !rate || !time){
        alert("Please fill all fields.");
        return;
    }

    let simpleInterest =
    (principal * rate * time) / 100;

    let totalAmount =
    principal + simpleInterest;

    document.getElementById("result").style.display =
    "block";

    document.getElementById("interest").innerHTML =
    "💰 Simple Interest: <b>₹" +
    simpleInterest.toLocaleString('en-IN') +
    "</b>";

    document.getElementById("total").innerHTML =
    "🏆 Total Amount: <b>₹" +
    totalAmount.toLocaleString('en-IN') +
    "</b>";
}
</script>

</body>
</html>
