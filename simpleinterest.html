<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Simple Interest Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
padding:20px;
}

.container{
width:100%;
max-width:650px;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
}

input:focus,
select:focus{
outline:none;
border-color:#2563eb;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

.result{
display:none;
margin-top:20px;
background:#f8fafc;
padding:20px;
border-radius:15px;
}

.result h2{
color:#2563eb;
margin-bottom:15px;
}

.info{
padding:10px;
margin:10px 0;
background:white;
border-left:5px solid #2563eb;
border-radius:8px;
font-size:17px;
}

.highlight{
font-weight:bold;
color:#16a34a;
}
</style>
</head>
<body>

<div class="container">

<h1>🏦 Advanced Simple Interest Calculator</h1>

<p class="subtitle">
Calculate Interest for Years, Months, Days, Hours & Minutes
</p>

<div class="input-group">
<label>Principal Amount (₹)</label>
<input type="number" id="principal" placeholder="Enter Amount">
</div>

<div class="input-group">
<label>Interest Rate (% Per Year)</label>
<input type="number" id="rate" placeholder="Enter Interest Rate">
</div>

<div class="input-group">
<label>Time Value</label>
<input type="number" id="time" placeholder="Enter Time">
</div>

<div class="input-group">
<label>Time Unit</label>
<select id="timeUnit">
<option value="year">Years</option>
<option value="month">Months</option>
<option value="day">Days</option>
<option value="hour">Hours</option>
<option value="minute">Minutes</option>
</select>
</div>

<button onclick="calculateSI()">
Calculate Interest
</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateSI(){

let principal =
parseFloat(document.getElementById("principal").value);

let rate =
parseFloat(document.getElementById("rate").value);

let time =
parseFloat(document.getElementById("time").value);

let unit =
document.getElementById("timeUnit").value;

if(!principal || !rate || !time){
alert("Please fill all fields");
return;
}

let years;

switch(unit){

case "year":
years = time;
break;

case "month":
years = time / 12;
break;

case "day":
years = time / 365;
break;

case "hour":
years = time / (365 * 24);
break;

case "minute":
years = time / (365 * 24 * 60);
break;

default:
years = time;
}

let interest =
(principal * rate * years) / 100;

let totalAmount =
principal + interest;

let monthlyInterest =
interest / (years * 12 || 1);

let dailyInterest =
interest / (years * 365 || 1);

document.getElementById("result").style.display = "block";

document.getElementById("result").innerHTML = `

<h2>📊 Calculation Result</h2>

<div class="info">
💰 Principal Amount:
<span class="highlight">
₹${principal.toLocaleString('en-IN')}
</span>
</div>

<div class="info">
📈 Interest Earned:
<span class="highlight">
₹${interest.toFixed(2)}
</span>
</div>

<div class="info">
🏆 Total Amount:
<span class="highlight">
₹${totalAmount.toFixed(2)}
</span>
</div>

<div class="info">
📅 Average Monthly Interest:
<span class="highlight">
₹${monthlyInterest.toFixed(2)}
</span>
</div>

<div class="info">
📆 Average Daily Interest:
<span class="highlight">
₹${dailyInterest.toFixed(2)}
</span>
</div>

<div class="info">
🚀 Growth:
<span class="highlight">
${((interest/principal)*100).toFixed(2)}%
</span>
</div>

`;

}

</script>

</body>
</html>
