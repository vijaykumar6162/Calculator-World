<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#141E30,#243B55);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:#fff;
    max-width:550px;
    width:100%;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
    text-align:center;
}

h1{
    color:#243B55;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#243B55;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#141E30;
}

.result{
    display:none;
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    background:#f4f8ff;
    text-align:left;
}

.result h2{
    color:#243B55;
    margin-bottom:10px;
}

.result p{
    margin:8px 0;
    font-size:17px;
}
</style>
</head>
<body>

<div class="container">
    <h1>😴 Sleep Calculator</h1>
    <p>Enter your wake-up time and find the best bedtime.</p>

    <input type="time" id="wakeTime">

    <button onclick="calculateSleep()">
        Calculate Bedtime
    </button>

    <div class="result" id="result">
        <h2>Recommended Bedtimes</h2>
        <p id="bed1"></p>
        <p id="bed2"></p>
        <p id="bed3"></p>
    </div>
</div>

<script>
function calculateSleep(){

    const wakeTime =
    document.getElementById("wakeTime").value;

    if(!wakeTime){
        alert("Please select wake-up time.");
        return;
    }

    let parts = wakeTime.split(":");
    let wakeMinutes =
    parseInt(parts[0])*60 + parseInt(parts[1]);

    function getTime(cycles){
        let sleepTime =
        wakeMinutes - (cycles * 90) - 15;

        while(sleepTime < 0){
            sleepTime += 1440;
        }

        let h = Math.floor(sleepTime/60);
        let m = sleepTime%60;

        let ampm = h >= 12 ? "PM" : "AM";
        h = h % 12;
        if(h === 0) h = 12;

        return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
    }

    document.getElementById("bed1").innerHTML =
    "🛌 6 Sleep Cycles (9 Hours): " + getTime(6);

    document.getElementById("bed2").innerHTML =
    "🌙 5 Sleep Cycles (7.5 Hours): " + getTime(5);

    document.getElementById("bed3").innerHTML =
    "⭐ 4 Sleep Cycles (6 Hours): " + getTime(4);

    document.getElementById("result").style.display =
    "block";
}
</script>

</body>
</html>
