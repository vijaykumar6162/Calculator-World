<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steps Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#11998e,#38ef7d);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:#fff;
    width:100%;
    max-width:550px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#11998e;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#11998e;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0f857b;
}

.result{
    display:none;
    margin-top:20px;
    padding:20px;
    border-radius:12px;
    background:#f3fff8;
}

.progress{
    width:100%;
    height:25px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#11998e;
    transition:1s;
}

h2{
    color:#11998e;
}
</style>
</head>
<body>

<div class="container">
    <h1>🚶 Daily Steps Calculator</h1>
    <p class="subtitle">Track your daily walking progress</p>

    <input type="number" id="steps" placeholder="Enter Steps Walked Today">

    <button onclick="calculateSteps()">Calculate Progress</button>

    <div class="result" id="result">
        <h2 id="status"></h2>
        <p id="message"></p>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <p style="margin-top:10px;">
            Goal: <b>10,000 Steps</b>
        </p>
    </div>
</div>

<script>
function calculateSteps(){

    let steps = parseInt(document.getElementById("steps").value);

    if(isNaN(steps) || steps < 0){
        alert("Please enter valid steps.");
        return;
    }

    let goal = 10000;
    let percent = (steps / goal) * 100;

    if(percent > 100){
        percent = 100;
    }

    document.getElementById("progressBar").style.width =
    percent + "%";

    document.getElementById("result").style.display =
    "block";

    if(steps >= 10000){
        document.getElementById("status").innerHTML =
        "🎉 Goal Achieved!";
        document.getElementById("message").innerHTML =
        "Excellent! You completed your daily step goal.";
    }
    else{
        document.getElementById("status").innerHTML =
        "💪 Keep Walking!";
        document.getElementById("message").innerHTML =
        "You need " + (goal - steps) +
        " more steps to reach 10,000.";
    }
}
</script>

</body>
</html>
