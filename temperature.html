<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Temperature Converter</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:650px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.icon{
text-align:center;
font-size:60px;
margin-bottom:10px;
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
}

input:focus,
select:focus{
outline:none;
border-color:#2563eb;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
display:none;
margin-top:20px;
background:#f8fafc;
padding:20px;
border-radius:15px;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-left:5px solid #2563eb;
border-radius:8px;
font-size:17px;
}

.highlight{
color:#16a34a;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="icon">🌡️</div>

<h1>Advanced Temperature Converter</h1>

<div class="input-group">
<label>Enter Temperature</label>
<input type="number" id="value" placeholder="Enter Temperature">
</div>

<div class="input-group">
<label>From Unit</label>
<select id="fromUnit">
<option value="C">Celsius (°C)</option>
<option value="F">Fahrenheit (°F)</option>
<option value="K">Kelvin (K)</option>
</select>
</div>

<div class="input-group">
<label>To Unit</label>
<select id="toUnit">
<option value="C">Celsius (°C)</option>
<option value="F">Fahrenheit (°F)</option>
<option value="K">Kelvin (K)</option>
</select>
</div>

<button onclick="convertTemperature()">
Convert Temperature
</button>

<div class="result" id="result">

<div class="card">
🌡️ Converted Temperature:
<span class="highlight" id="output"></span>
</div>

<div class="card">
📊 Conversion Completed Successfully
</div>

</div>

</div>

<script>

function convertTemperature(){

let value =
parseFloat(document.getElementById("value").value);

let from =
document.getElementById("fromUnit").value;

let to =
document.getElementById("toUnit").value;

if(isNaN(value)){
alert("Please enter temperature");
return;
}

let celsius;

if(from==="C"){
celsius=value;
}
else if(from==="F"){
celsius=(value-32)*5/9;
}
else if(from==="K"){
celsius=value-273.15;
}

let result;

if(to==="C"){
result=celsius;
}
else if(to==="F"){
result=(celsius*9/5)+32;
}
else if(to==="K"){
result=celsius+273.15;
}

document.getElementById("output").innerHTML =
result.toFixed(2)+" °"+to;

document.getElementById("result").style.display="block";

}

</script>

</body>
</html>
