<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wholesale Price Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:750px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.icon{
text-align:center;
font-size:60px;
margin-bottom:10px;
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
font-weight:600;
margin-bottom:6px;
}

input{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
display:none;
margin-top:20px;
background:#f8fafc;
padding:20px;
border-radius:15px;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-left:5px solid #2563eb;
border-radius:8px;
}

.highlight{
color:#16a34a;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="icon">📦</div>

<h1>Wholesale Price Calculator</h1>

<div class="input-group">
<label>Product Name</label>
<input type="text" id="product"
placeholder="Enter Product Name">
</div>

<div class="input-group">
<label>Wholesale Cost Per Unit (₹)</label>
<input type="number" id="cost"
placeholder="Enter Cost">
</div>

<div class="input-group">
<label>Quantity</label>
<input type="number" id="qty"
placeholder="Enter Quantity">
</div>

<div class="input-group">
<label>Profit Margin (%)</label>
<input type="number" id="profit"
placeholder="Enter Profit %">
</div>

<div class="input-group">
<label>GST (%)</label>
<input type="number" id="gst"
placeholder="Enter GST %" value="0">
</div>

<button onclick="calculateWholesale()">
Calculate Price
</button>

<div class="result" id="result">

<div class="card">
📦 Product:
<span class="highlight" id="productName"></span>
</div>

<div class="card">
💰 Total Cost:
<span class="highlight" id="totalCost"></span>
</div>

<div class="card">
📈 Profit Amount:
<span class="highlight" id="profitAmount"></span>
</div>

<div class="card">
🏷️ Selling Price:
<span class="highlight" id="sellingPrice"></span>
</div>

<div class="card">
🧾 Price Including GST:
<span class="highlight" id="finalPrice"></span>
</div>

</div>

</div>

<script>

function calculateWholesale(){

let product =
document.getElementById("product").value;

let cost =
parseFloat(document.getElementById("cost").value);

let qty =
parseFloat(document.getElementById("qty").value);

let profit =
parseFloat(document.getElementById("profit").value);

let gst =
parseFloat(document.getElementById("gst").value) || 0;

if(isNaN(cost) || isNaN(qty) || isNaN(profit)){
alert("Please fill all required fields");
return;
}

let totalCost = cost * qty;

let profitAmount =
(totalCost * profit) / 100;

let sellingPrice =
totalCost + profitAmount;

let finalPrice =
sellingPrice +
((sellingPrice * gst) / 100);

document.getElementById("productName").innerHTML =
product || "Product";

document.getElementById("totalCost").innerHTML =
"₹" + totalCost.toLocaleString('en-IN');

document.getElementById("profitAmount").innerHTML =
"₹" + profitAmount.toLocaleString('en-IN');

document.getElementById("sellingPrice").innerHTML =
"₹" + sellingPrice.toLocaleString('en-IN');

document.getElementById("finalPrice").innerHTML =
"₹" + finalPrice.toLocaleString('en-IN',{
maximumFractionDigits:2
});

document.getElementById("result").style.display =
"block";

}

</script>

</body>
</html>
